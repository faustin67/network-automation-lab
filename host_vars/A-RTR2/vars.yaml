---
# A-RTR2 — generated by excel_to_vars.py

campus: campus_a
device_role: ospf_vrrp_backup
hostname: A-RTR2
interfaces:
  ens33:
    addresses:
    - 172.16.100.12/24
    comment: Management
    nameservers:
      addresses:
      - 172.16.200.10
    routes:
    - to: default
      via: 172.16.100.1
    type: ethernet
  ens37:
    addresses:
    - 172.16.2.6/30
    comment: Switch uplink
    type: ethernet
  ens38:
    addresses:
    - 172.16.1.2/30
    comment: OSPF link
    type: ethernet
  ens39:
    addresses:
    - 172.16.1.9/30
    comment: OSPF link
    type: ethernet
  ens40:
    addresses:
    - 172.16.200.2/24
    comment: VLAN 200 — VRRP Backup — macvlan vrrp4-2
    type: ethernet
  lo:
    addresses:
    - 172.16.255.2/32
    comment: OSPF Router-ID
    type: loopback
mgmt_interface: ens33
ospf:
  area: 0.0.0.0
  interfaces:
    ens37:
      cost: 10
      network: 172.16.2.4/30
      network_type: point-to-point
      passive: false
    ens38:
      cost: 10
      network: 172.16.1.0/30
      network_type: point-to-point
      passive: false
    ens39:
      cost: 10
      network: 172.16.1.8/30
      network_type: point-to-point
      passive: false
    ens40:
      cost: 10
      network: 172.16.200.0/24
      network_type: broadcast
      passive: false
    lo:
      cost: 1
      network: 172.16.255.2/32
      passive: true
  router_id: 172.16.255.2
vrrp:
- advert_interval: 1
  group: 2
  interface: ens40
  preempt: true
  priority: 100
  real_ip: 172.16.200.2
  role: backup
  virtual_ip: 172.16.200.254
  vlan: 200
